<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Typing Speed Tester</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>⚡ Typing Speed Tester</h1>

        <div class="top-bar">
            <button id="themeBtn">🌙 Dark Mode</button>
            <button id="newQuoteBtn">🔄 New Quote</button>
        </div>

        <div class="quote-box">
            <p id="quote"></p>
        </div>

        <textarea id="input" placeholder="Start typing here..."></textarea>

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <div class="stats">

            <div class="card">
                <h2 id="time">60</h2>
                <p>Time Left</p>
            </div>

            <div class="card">
                <h2 id="wpm">0</h2>
                <p>WPM</p>
            </div>

            <div class="card">
                <h2 id="accuracy">100%</h2>
                <p>Accuracy</p>
            </div>

            <div class="card">
                <h2 id="mistakes">0</h2>
                <p>Mistakes</p>
            </div>

        </div>

        <button id="restartBtn">Restart Test</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
